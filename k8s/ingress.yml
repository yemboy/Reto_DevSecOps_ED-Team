apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ed-team-app-ingress
  labels:
    app: ed-team-app
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ed-team-app-service
            port:
              number: 80