apiVersion: v1
kind: Service
metadata:
  name: ed-team-app-service
  labels:
    app: ed-team-app
  annotations:
    description: "Reto tecnico devops ED Team"
spec:
  selector:
    app: ed-team-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
  sessionAffinity: None